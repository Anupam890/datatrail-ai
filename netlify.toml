[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # BETTER_AUTH_URL is a plain URL (e.g. https://yourdomain.com) used server-side only.
  # NEXT_PUBLIC_SUPABASE_URL and NEXT_PUBLIC_SUPABASE_ANON_KEY are intentionally public
  # (Supabase anon key is safe to expose — it's restricted by Row Level Security).
  SECRETS_SCAN_OMIT_KEYS = "BETTER_AUTH_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_SUPABASE_URL"
